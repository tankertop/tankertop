version: 2
project_name: tankertop

before:
  hooks:
    - go mod tidy

builds:
  - id: tankertop
    main: .
    binary: tankertop
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    package_name: tankertop
    vendor: Tobias Penzkofer
    homepage: https://github.com/tankertop/tankertop
    maintainer: Tobias Penzkofer <1944948+tpenzkofer@users.noreply.github.com>
    description: btop-style terminal dashboard for Kubernetes clusters.
    license: MIT
    formats:
      - deb
      - rpm
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/tankertop/LICENSE
      - src: README.md
        dst: /usr/share/doc/tankertop/README.md

# GHCR only for now. To add Docker Hub, add the tankertop/tankertop:* image
# templates back here and the login step in release.yml (needs DOCKERHUB_* secrets).
dockers:
  - id: amd64
    goarch: amd64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/tankertop/tankertop:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=tankertop"
      - "--label=org.opencontainers.image.source=https://github.com/tankertop/tankertop"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"
  - id: arm64
    goarch: arm64
    use: buildx
    dockerfile: Dockerfile
    image_templates:
      - "ghcr.io/tankertop/tankertop:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
      - "--label=org.opencontainers.image.title=tankertop"
      - "--label=org.opencontainers.image.source=https://github.com/tankertop/tankertop"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.licenses=MIT"

docker_manifests:
  - name_template: "ghcr.io/tankertop/tankertop:{{ .Version }}"
    image_templates:
      - "ghcr.io/tankertop/tankertop:{{ .Version }}-amd64"
      - "ghcr.io/tankertop/tankertop:{{ .Version }}-arm64"
  - name_template: "ghcr.io/tankertop/tankertop:latest"
    image_templates:
      - "ghcr.io/tankertop/tankertop:{{ .Version }}-amd64"
      - "ghcr.io/tankertop/tankertop:{{ .Version }}-arm64"

brews:
  - repository:
      owner: tankertop
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/tankertop/tankertop"
    description: "btop-style terminal dashboard for Kubernetes and Docker, monitorable over SSH with no install."
    license: MIT
    install: |
      bin.install "tankertop"
    test: |
      system "#{bin}/tankertop", "--version"

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
