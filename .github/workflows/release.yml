name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release
  packages: write # push images to GHCR

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Multi-arch container images (linux/amd64 + linux/arm64).
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # To add Docker Hub, restore the login step here (needs DOCKERHUB_USERNAME /
      # DOCKERHUB_TOKEN secrets) and the tankertop/tankertop images in .goreleaser.yaml.

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to the tankertop/homebrew-tap repo.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
