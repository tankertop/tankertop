version: 2
project_name: tankertop

before:
  hooks:
    - go mod tidy

builds:
  - id: tankertop
    main: .
    binary: tankertop
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

nfpms:
  - id: packages
    package_name: tankertop
    vendor: Tobias Penzkofer
    homepage: https://github.com/tankertop/tankertop
    maintainer: Tobias Penzkofer <penzkofert@gmail.com>
    description: btop-style terminal dashboard for Kubernetes clusters.
    license: MIT
    formats:
      - deb
      - rpm
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    contents:
      - src: LICENSE
        dst: /usr/share/doc/tankertop/LICENSE
      - src: README.md
        dst: /usr/share/doc/tankertop/README.md

checksum:
  name_template: checksums.txt

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
